<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="../Css/admin.css">
</head>
<body>

    <div class="admin-layout d-flex">

        <!-- SIDEBAR -->
        <aside class="sidebar p-3" style="width: 270px;">
            <h4 class="text-white mb-4">🍭 Mala Candys</h4>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link active">🏠 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="productos.html" class="nav-link">📦 Productos</a>
                </li>
                <li class="nav-item">
                    <a href="ventas.html" class="nav-link">📊 Ventas</a>
                </li>
                <li class="nav-item">
                    <a href="compras.html" class="nav-link">🧾 Compras</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="login.html" class="nav-link text-danger bg-white">🚪 Salir</a>
                </li>
            </ul>
        </aside>

        <!-- CONTENIDO DERECHO -->
        <div class="admin-content w-100 d-flex flex-column">

            <!-- TOPBAR -->
            <header class="admin-topbar d-flex align-items-center justify-content-between px-4">
                <span class="topbar-title">Panel de Administración</span>


                <div class="d-flex align-items-center gap-3">
                    <a href="index.html" class="topbar-link">Ver sitio</a>
                    <span class="fw-semibold">Admin</span>
                </div>
            </header>

            <!-- MAIN -->
            <main class="p-4">

                <h2 class="mb-4">Dashboard</h2>
                <p>Bienvenido al panel de administración</p>

                <div class="row g-4">

                    <div class="col-md-4">
                        <div class="card shadow p-4">
                            <h5>💰 Ventas</h5>
                            <h3 class="text-pink">$0</h3>
                            <small class="text-muted">Total del mes</small>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow p-4">
                            <h5>📦 Productos</h5>
                            <h3 class="text-pink">0</h3>
                            <small class="text-muted">En stock</small>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow p-4">
                            <h5>🧾 Compras</h5>
                            <h3 class="text-pink">0</h3>
                            <small class="text-muted">Registradas</small>
                        </div>
                    </div>

                </div>

            </main>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Admin - Compras</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS Admin -->
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar p-3" style="width:270px;">
            <h4 class="text-white mb-4">🍭 Mala Candys</h4>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="productos.html" class="nav-link">📦 Productos</a>
                </li>
                <li class="nav-item">
                    <a href="ventas.html" class="nav-link">📊 Ventas</a>
                </li>
                <li class="nav-item">
                    <a href="compras.html" class="nav-link active">🧾 Compras</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="login.html" class="nav-link text-danger bg-white">🚪 Salir</a>
                </li>
            </ul>
        </div>

        <!-- CONTENIDO -->
        <div class="p-4 w-100">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-pink">Compras</h2>
                <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#compraModal">
                    ➕ Nueva Compra
                </button>
            </div>

            <!-- TABLA COMPRAS -->
            <table class="table table-striped shadow">
                <thead class="table-light">
                    <tr>
                        <th>Fecha</th>
                        <th>Proveedor</th>
                        <th>Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCompras">
                    <!-- JS -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- MODAL COMPRA -->
    <div class="modal fade" id="compraModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Registrar Compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- PROVEEDOR -->
                    <div class="mb-3">
                        <label class="form-label">Proveedor</label>
                        <input type="text" id="proveedor" class="form-control">
                    </div>

                    <!-- DETALLE -->
                    <div class="row g-2 mb-3">
                        <div class="col-md-5">
                            <select id="productoCompra" class="form-select"></select>
                        </div>

                        <div class="col-md-3">
                            <input type="number" id="cantidadCompra" class="form-control" placeholder="Cantidad">
                        </div>

                        <div class="col-md-3">
                            <input type="number" id="precioCompra" class="form-control" placeholder="Precio">
                        </div>

                        <div class="col-md-1 d-grid">
                            <button id="btnAgregarDetalle" class="btn btn-outline-pink">+</button>
                        </div>
                    </div>

                    <!-- DETALLES TABLA -->
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cant.</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tablaDetalleCompra"></tbody>
                    </table>

                    <div class="text-end fw-bold mt-3">
                        Total: $<span id="totalCompra">0</span>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-pink" id="btnGuardarCompra">Guardar Compra</button>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/compras.js" defer></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión | Mala Candys</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../Css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🍭 Mala Candys</a>
            <ul class="navbar-nav ms-auto" id="nav-auth"></ul>
        </div>
    </nav>

    <!-- LOGIN -->
    <div class="container mt-5" style="max-width:400px">

        <h3 class="text-center mb-4">Iniciar sesión</h3>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control">
        </div>

        <div class="mb-3">
            <label>Contraseña</label>

            <div class="input-group">
                <input type="password" id="password" class="form-control">

                <span class="input-group-text"
                      style="cursor:pointer"
                      onclick="togglePassword()">

                    <i id="eyeIcon" class="bi bi-eye"></i>

                </span>
            </div>
        </div>

        <button class="btn btn-pink w-100" onclick="login()">
            Ingresar
        </button>

        <div class="text-center mt-3">

            <div>
                <a href="register.html">Crear cuenta</a>
            </div>

            <div class="mt-2">
                <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
            </div>

        </div>

        <div id="error" class="alert alert-danger mt-3 d-none"></div>

    </div>

    <script src="../Js/auth-navbar.js" defer></script>
    <script src="../Js/login.js" defer></script>

    <script>
        function togglePassword() {

            const password = document.getElementById("password")
            const icon = document.getElementById("eyeIcon")

            if (password.type === "password") {
                password.type = "text"
                icon.classList.replace("bi-eye", "bi-eye-slash")
            } else {
                password.type = "password"
                icon.classList.replace("bi-eye-slash", "bi-eye")
            }

        }
    </script>

</body>
</html>

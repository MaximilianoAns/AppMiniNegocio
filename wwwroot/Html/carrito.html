<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito | Mala Candys</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Css/styles.css">
 
</head>

<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand logo-candy" href="index.html">Mala Candys</a>
        </div>
    </nav>

    <section class="container my-5">
        <h2 class="mb-4">🛒 Mi carrito</h2>

        <div id="contenedorCarrito" class="d-grid gap-3"></div>

        <div class="mt-4 border-top pt-3 d-flex justify-content-between align-items-center">
            <button class="btn btn-outline-danger" id="btnVaciarCarrito">Vaciar carrito</button>
            <a href="catalogoProductos.html" class="btn btn-outline-danger">Atrás</a>
            <button class="btn btn-pink px-4" id="btnFinalizar">Finalizar pedido</button>
        </div>
    </section>


    <!-- MODAL CONFIRMAR ENVÍO -->
    <div id="modalConfirmacion" class="modal-confirmacion">
        <div class="modal-contenido">
            <p>Serás redirigido a WhatsApp para enviar tu pedido.</p>
            <div class="modal-botones">
                <button id="cancelarEnvio">Cancelar</button>
                <button id="confirmarEnvio">Sí, enviar pedido</button>
            </div>
        </div>
    </div>

    <!-- MODAL VACIAR CARRITO -->
    <div id="modalVaciar" class="modal-confirmacion">
        <div class="modal-contenido">
            <p>¿Seguro que querés vaciar el carrito?</p>
            <div class="modal-botones">
                <button id="btncancelarVaciar">Cancelar</button>
                <button id="btnconfirmarVaciar">Sí, vaciar</button>
            </div>
        </div>
    </div>


    <script src="../Js/carrito.js" defer></script>
    <script src="../Js/carritoPage.js" defer></script>
</body>
</html>

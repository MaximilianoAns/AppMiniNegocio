<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combos | Mala Candys Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/admin.css">
    <link rel="stylesheet" href="../Css/combos.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">🍭</span>
                <div>
                    <div class="brand-text">Mala Candys</div>
                    <div class="brand-sub">Panel Admin</div>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li><span class="nav-label">Principal</span></li>
                <li><a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></a></li>
                <li><span class="nav-label">Gestión</span></li>
                <li><a href="productos.html" class="nav-link"><span class="nav-icon">📦</span><span class="nav-text">Productos</span></a></li>
                <li><a href="ventas.html" class="nav-link"><span class="nav-icon">💰</span><span class="nav-text">Ventas</span></a></li>
                <li><a href="compras.html" class="nav-link"><span class="nav-icon">🛍️</span><span class="nav-text">Compras</span></a></li>
                <li><a href="combos.html" class="nav-link active"><span class="nav-icon">🍬</span><span class="nav-text">Combos</span></a></li>
                <li class="nav-exit mt-auto">
                    <a href="login.html" class="nav-link" onclick="logout()">
                        <span class="nav-icon">🚪</span><span class="nav-text">Salir</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- CONTENIDO -->
        <div class="admin-content">

            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn-hamburger" id="btnHamburger">☰</button>
                    <span class="topbar-title">Combos</span>
                </div>
                <div class="topbar-actions">
                    <a href="index.html" class="topbar-link">Ver sitio →</a>
                    <div class="topbar-user">
                        <div class="topbar-avatar">A</div>
                        <span class="d-none d-sm-inline">Admin</span>
                    </div>
                </div>
            </header>

            <main class="admin-main">

                <!-- HEADER -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">🍬 <span>Combos</span></h1>
                        <small class="text-muted fw-bold">Configurá los combos que se muestran en el catálogo</small>
                    </div>
                    <button class="btn btn-pink" id="btnNuevoCombo" onclick="togglePanel()">➕ Nuevo Combo</button>
                </div>

                <!-- PANEL NUEVO / EDITAR COMBO -->
                <div id="panelCombo" style="display:none;">
                    <div class="panel-combo">
                        <div class="panel-head">
                            <span class="panel-head-title" id="panelTitulo">🍬 Nuevo combo</span>
                            <button class="panel-head-close" onclick="togglePanel()">✕</button>
                        </div>
                        <div class="panel-body">
                            <input type="hidden" id="comboEditId">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Peso del combo</label>
                                    <div class="input-suffix">
                                        <input type="number" class="form-control" id="inputPeso" placeholder="ej: 650" min="1">
                                        <span>gr</span>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Precio</label>
                                    <div class="input-prefix">
                                        <span>$</span>
                                        <input type="number" class="form-control" id="inputPrecio" placeholder="ej: 2500" min="1">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Mínimo de gustos</label>
                                    <input type="number" class="form-control" id="inputMinimoGustos" placeholder="ej: 6" min="1">
                                </div>
                            </div>
                            <div class="panel-footer">
                                <button class="btn-cancelar-combo" onclick="togglePanel()">Cancelar</button>
                                <button class="btn btn-pink" onclick="guardarCombo()">💾 Guardar combo</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABLA -->
                <div class="table-wrapper">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Peso</th>
                                <th>Precio</th>
                                <th>Mín. gustos</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyCombos">
                            <tr><td colspan="5" class="text-center py-4" style="color:#9b8ab8;">Cargando combos...</td></tr>
                        </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/combos.js"></script>
</body>
</html>

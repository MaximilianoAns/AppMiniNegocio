<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi perfil | Mala Candys</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../Css/styles.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Mala Candys</a>
            <ul class="navbar-nav ms-auto" id="nav-auth"></ul>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row g-4">

            <!-- SIDEBAR PERFIL -->
            <div class="col-md-4">

                <div class="card shadow-sm text-center">

                    <div class="card-body">

                        <i class="bi bi-person-circle fs-1 text-primary"></i>

                        <h5 class="mt-3 mb-0" id="perfil-nombre">Usuario</h5>

                        <p class="text-muted mb-1" id="perfil-email">
                            email@correo.com
                        </p>

                        <p class="text-muted mb-1">
                            <i class="bi bi-geo-alt"></i>
                            <span id="perfil-localidad"></span>
                        </p>

                        <p class="text-muted">
                            <i class="bi bi-telephone"></i>
                            <span id="perfil-telefono"></span>
                        </p>

                        <hr>

                    </div>

                </div>

            </div>

            <!-- INFORMACIÓN PERSONAL -->
            <div class="col-md-8">

                <div class="card shadow-sm">

                    <div class="card-header fw-bold">
                        Información personal
                    </div>

                    <div class="card-body" id="perfilForm">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" id="apellido" class="form-control" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Localidad</label>
                            <input type="text" id="localidad" class="form-control" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="direccion" class="form-control" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefono" class="form-control" disabled>
                        </div>

                       

                        <hr>

                        <button id="btnEditar" class="btn btn-outline-primary">
                            Editar datos
                        </button>

                        <button id="btnGuardar" class="btn btn-success d-none">
                            Guardar cambios
                        </button>

                        <button class="btn btn-outline-secondary ms-2">
                            Cambiar contraseña
                        </button>

                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="../Js/api.js"></script>
    <script src="../Js/auth-navbar.js"></script>
    <script src="../Js/perfil.js"></script>

</body>
</html>

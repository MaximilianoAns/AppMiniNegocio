<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras | Mala Candys Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Css/admin.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🍭</span>
      <div>
        <div class="brand-text">Mala Candys</div>
        <div class="brand-sub">Panel Admin</div>
      </div>
    </div>
    <ul class="sidebar-nav">
      <li><span class="nav-label">Principal</span></li>
      <li><a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></a></li>
      <li><span class="nav-label">Gestión</span></li>
      <li><a href="productos.html" class="nav-link"><span class="nav-icon">📦</span><span class="nav-text">Productos</span></a></li>
      <li><a href="ventas.html"    class="nav-link"><span class="nav-icon">📊</span><span class="nav-text">Ventas</span></a></li>
      <li><a href="compras.html"   class="nav-link active"><span class="nav-icon">🧾</span><span class="nav-text">Compras</span></a></li>
      <li class="nav-exit mt-auto"><a href="login.html" class="nav-link"><span class="nav-icon">🚪</span><span class="nav-text">Salir</span></a></li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <div class="admin-content">

    <header class="admin-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn-hamburger" id="btnHamburger">☰</button>
        <span class="topbar-title">Compras</span>
      </div>
      <div class="topbar-actions">
        <a href="index.html" class="topbar-link">Ver sitio 🌐</a>
        <div class="topbar-user">
          <div class="topbar-avatar">A</div>
          <span class="d-none d-sm-inline">Admin</span>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="page-header">
        <h1 class="page-title">🧾 <span>Compras</span></h1>
        <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#compraModal">
          ➕ Nueva Compra
        </button>
      </div>

      <div class="table-wrapper">
        <table class="table table-hover table-striped">
          <thead>
            <tr>
              <th>Fecha</th><th>Proveedor</th><th>Total</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCompras"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- MODAL COMPRA -->
<div class="modal fade" id="compraModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🧾 Registrar Compra</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Proveedor</label>
          <input type="text" id="proveedor" class="form-control" placeholder="Nombre del proveedor">
        </div>
        <div class="row g-2 mb-3">
          <div class="col-md-5">
            <label class="form-label">Producto</label>
            <select id="productoCompra" class="form-select"></select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Cantidad</label>
            <input type="number" id="cantidadCompra" class="form-control" placeholder="0">
          </div>
          <div class="col-md-3">
            <label class="form-label">Precio unitario</label>
            <input type="number" id="precioCompra" class="form-control" placeholder="0.00">
          </div>
          <div class="col-md-1 d-flex align-items-end">
            <button id="btnAgregarDetalle" class="btn btn-outline-pink w-100">+</button>
          </div>
        </div>
        <div class="table-wrapper mb-3">
          <table class="table table-sm">
            <thead>
              <tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th><th></th></tr>
            </thead>
            <tbody id="tablaDetalleCompra"></tbody>
          </table>
        </div>
        <div class="text-end fw-bold mt-2" style="font-size:1.1rem;color:#2d1b4e;">
          Total: $<span id="totalCompra">0</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-pink" id="btnGuardarCompra">💾 Guardar Compra</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../Js/compras.js" defer></script>
<script>
  const btn = document.getElementById('btnHamburger');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  btn.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
  overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar p-3" style="width:270px;">
            <h4 class="text-white mb-4">🍭 Mala Candys</h4>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="productos.html" class="nav-link active">📦 Productos</a>
                </li>
                <li class="nav-item">
                    <a href="ventas.html" class="nav-link">📊 Ventas</a>
                </li>
                <li class="nav-item">
                    <a href="compras.html" class="nav-link">🧾 Compras</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="login.html" class="nav-link text-danger bg-white">🚪 Salir</a>
                </li>
            </ul>
        </div>

        <!-- CONTENIDO -->
        <div class="p-4 w-100">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Productos</h2>
                <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#productoModal">
                    ➕ Nuevo Producto
                </button>
            </div>

            <table class="table table-striped shadow">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                </tbody>
            </table>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="productoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="errorMsg" class="alert alert-danger d-none"></div>

                    <input type="hidden" id="productoId">
                    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
                    <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
                    <input type="number" id="stock" min="0" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button id="btnGuardar" type="button" class="btn btn-pink">Guardar</button>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Eliminación -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    ¿Estás seguro que deseas eliminar este producto?
                    <p class="text-muted mb-0">Esta acción no se puede deshacer.</p>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button class="btn btn-danger" id="btnConfirmDelete">
                        Eliminar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="../Js/auth-navbar.js" defer></script>
    <script src="../Js/productos-admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

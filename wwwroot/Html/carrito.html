<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Mala Candys</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand logo-candy" href="index.html">🍭 Mala Candys</a>
            <a href="catalogoProductos.html" class="btn btn-outline-pink btn-sm">← Seguir comprando</a>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="section-header">
        <div class="container">
            <h1 class="page-title">🛒 Mi <span>carrito</span></h1>
        </div>
    </div>

    <section class="container my-4">
        <div class="row g-4">

            <!-- ITEMS -->
            <div class="col-lg-8">
                <div id="contenedorCarrito" class="d-grid gap-3"></div>
            </div>

            <!-- RESUMEN -->
            <div class="col-lg-4">
                <div class="resumen-card">
                    <h5 style="font-weight:800;color:var(--text);margin-bottom:1rem;">Resumen del pedido</h5>
                    <hr style="border-color:rgba(247,37,133,.1);margin:.75rem 0;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span style="font-weight:700;color:var(--text-soft);">Total</span>
                        <span style="font-size:1.5rem;font-weight:900;color:var(--candy-pink);" id="totalResumen">$0</span>
                    </div>
                    <button class="btn btn-pink w-100 py-2 mb-2" id="btnFinalizar" style="font-size:1rem;">
                        Finalizar pedido 🚀
                    </button>
                    <button class="btn btn-outline-pink w-100" id="btnVaciarCarrito">
                        Vaciar carrito 🗑️
                    </button>
                </div>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-pink mt-5">
        <div class="container py-4 text-center">
            <small class="footer-text">© 2026 Mala Candys · Todos los derechos reservados</small>
        </div>
    </footer>

    <!-- MODAL CONFIRMAR ENVÍO -->
    <div id="modalConfirmacion" class="modal-confirmacion">
        <div class="modal-contenido">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">📲</div>
            <p>Serás redirigido a WhatsApp para enviar tu pedido.</p>
            <div class="modal-botones">
                <button id="cancelarEnvio">Cancelar</button>
                <button id="confirmarEnvio">Sí, enviar</button>
            </div>
        </div>
    </div>

    <!-- MODAL VACIAR -->
    <div id="modalVaciar" class="modal-confirmacion">
        <div class="modal-contenido">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">🗑️</div>
            <p>¿Seguro que querés vaciar el carrito?</p>
            <div class="modal-botones">
                <button id="btncancelarVaciar">Cancelar</button>
                <button id="btnconfirmarVaciar">Sí, vaciar</button>
            </div>
        </div>
    </div>

    <script src="../Js/carrito.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

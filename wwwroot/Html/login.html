<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Mala Candys</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../Css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <!-- Decoración de fondo -->
    <div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;">
      <div style="position:absolute;top:-60px;left:-60px;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,.06);"></div>
      <div style="position:absolute;bottom:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05);"></div>
    </div>

    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="auth-logo">🍭 Mala Candys</div>
        <span class="auth-subtitle">Iniciá sesión para continuar</span>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="tu@email.com">
      </div>

      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input type="password" id="password" class="form-control" placeholder="••••••••">
          <span class="input-group-text" onclick="togglePassword()">
            <i id="eyeIcon" class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <button class="btn btn-pink w-100 py-2 mb-3" onclick="login()" style="font-size:1rem;">
        Ingresar →
      </button>

      <hr class="auth-divider">

      <div class="text-center" style="font-size:.9rem;">
        <a href="register.html" class="auth-link">¿No tenés cuenta? Crear una gratis</a>
      </div>

      <div id="error" class="mt-3 d-none"
           style="border-radius:12px;background:rgba(247,37,133,.1);color:var(--candy-pink);padding:.75rem 1rem;font-weight:700;font-size:.88rem;"></div>
    </div>
  </div>

  <script src="../Js/auth-navbar.js" defer></script>
  <script src="../Js/login.js" defer></script>
  <script>
    function togglePassword() {
      const p = document.getElementById('password'), i = document.getElementById('eyeIcon');
      if (p.type === 'password') { p.type = 'text'; i.classList.replace('bi-eye','bi-eye-slash'); }
      else { p.type = 'password'; i.classList.replace('bi-eye-slash','bi-eye'); }
    }
  </script>
</body>
</html>

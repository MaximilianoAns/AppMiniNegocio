<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil | Mala Candys</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../Css/styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand logo-candy" href="index.html">🍭 Mala Candys</a>
      <ul class="navbar-nav ms-auto" id="nav-auth"></ul>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="section-header">
    <div class="container">
      <h1 class="page-title">👤 Mi <span>perfil</span></h1>
    </div>
  </div>

  <div class="container my-4">
    <div class="row g-4">

      <!-- TARJETA USUARIO -->
      <div class="col-md-4">
        <div class="card text-center p-4">
          <div class="perfil-avatar">👤</div>
          <h5 style="font-weight:800;color:var(--text);margin-bottom:.25rem;" id="perfil-nombre">Usuario</h5>
          <p style="color:var(--text-soft);font-size:.88rem;margin-bottom:.25rem;" id="perfil-email">email@correo.com</p>
          <p style="color:var(--text-soft);font-size:.82rem;margin-bottom:.25rem;">
            <i class="bi bi-geo-alt"></i> <span id="perfil-localidad"></span>
          </p>
          <p style="color:var(--text-soft);font-size:.82rem;margin-bottom:1rem;">
            <i class="bi bi-telephone"></i> <span id="perfil-telefono"></span>
          </p>
          <hr style="border-color:rgba(247,37,133,.1);">
          <button id="btnEditar" class="btn btn-outline-pink w-100">
            <i class="bi bi-pencil"></i> Editar datos
          </button>
        </div>
      </div>

      <!-- FORMULARIO -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-body p-4">
            <h5 style="font-weight:800;color:var(--text);margin-bottom:1.5rem;">Información personal</h5>
            <div id="perfilForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nombre</label>
                  <input type="text" id="nombre" class="form-control" disabled>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Apellido</label>
                  <input type="text" id="apellido" class="form-control" disabled>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Localidad</label>
                  <input type="text" id="localidad" class="form-control" disabled>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Teléfono</label>
                  <input type="text" id="telefono" class="form-control" disabled>
                </div>
                <div class="col-12">
                  <label class="form-label">Dirección</label>
                  <input type="text" id="direccion" class="form-control" disabled>
                </div>
                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input type="text" id="email" class="form-control" disabled>
                </div>
              </div>
              <hr style="border-color:rgba(247,37,133,.1);margin:1.5rem 0;">
              <div class="d-flex gap-2 flex-wrap">
                <button id="btnGuardar" class="btn btn-pink d-none">
                  <i class="bi bi-check-lg"></i> Guardar cambios
                </button>
                <button class="btn btn-outline-pink">Cambiar contraseña</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer-pink mt-5">
    <div class="container py-4 text-center">
      <small class="footer-text">© 2026 Mala Candys · Todos los derechos reservados</small>
    </div>
  </footer>

  <script src="../Js/api.js"></script>
  <script src="../Js/auth-navbar.js"></script>
  <script src="../Js/perfil.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>


    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar p-3" style="width:270px;">
            <h4 class="text-white mb-4">🍭 Mala Candys</h4>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="productos.html" class="nav-link">📦 Productos</a>
                </li>
                <li class="nav-item">
                    <a href="ventas.html" class="nav-link active">📊 Ventas</a>
                </li>
                <li class="nav-item">
                    <a href="compras.html" class="nav-link">🧾 Compras</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="login.html" class="nav-link text-danger bg-white">🚪 Salir</a>
                </li>
            </ul>
        </div>



        <!-- CONTENIDO -->
        <div class="p-4 w-100">

            <!-- HEADER -->
            <div class="d-flex justify-content-between mb-3">
                <h2 class="text-pink">Ventas</h2>
                <button id="btnNuevaVenta" class="btn btn-pink">
                    ➕ Nueva Venta
                </button>
            </div>

            <!-- MINI FORMULARIO -->
            <div id="formNuevaVenta" class="card shadow-sm mb-4 d-none">
                <div class="card-body">

                    <h5 class="mb-3">Nueva Venta</h5>

                    <div class="row g-3 align-items-end mb-3">
                        <div class="col-md-5">
                            <label>Producto</label>
                            <select id="selectProducto" class="form-select"></select>
                        </div>

                        <div class="col-md-3">
                            <label>Cantidad</label>
                            <input type="number" id="inputCantidad" class="form-control" min="1">
                        </div>

                        <!-- Mensaje de error -->
                        <div class="invalid-feedback" id="errorStock"></div>

                        <div class="col-md-4">
                            <button id="btnAgregarProducto" class="btn btn-outline-pink w-100">
                                ➕ Agregar
                            </button>
                        </div>
                    </div>

                    <table class="table table-sm table-bordered">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cant.</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="detalleVentaBody"></tbody>
                    </table>

                    <div class="d-flex justify-content-between mt-3">
                        <h5>Total: $ <span id="totalVenta">0</span></h5>

                        <div>
                            <button id="btnCancelarVenta" class="btn btn-secondary me-2">
                                Cancelar
                            </button>
                            <button id="btnConfirmarVenta" class="btn btn-pink">
                                💾 Confirmar
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- TABLA VENTAS -->
            <table class="table table-striped shadow">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Detalle</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tblVentasBody"></tbody>
            </table>

        </div>
    </div>

    <script src="../js/ventas.js"></script>
</body>
</html>

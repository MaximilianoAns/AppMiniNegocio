<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Venta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card-header {
            background-color: #ff5c8a;
            color: white;
        }

        .anulada {
            color: red;
            font-weight: bold;
        }


        .btn-rosa {
            background-color: #ff5c8a; /* rosa Bootstrap */
            color: white;
            border: none;
        }

            .btn-rosa:hover {
                background-color: #ff5c8a;
                color: white;
            }

    </style>
</head>
<body class="p-4">

    <div class="container">

        <a href="ventas.html" class="btn btn-rosa mb-3">⬅ Volver</a>


        <div class="card shadow mb-4">
            <div class="card-header">
                <h4 class="mb-0">🧾 Detalle de Venta</h4>
            </div>

            <div class="card-body">
                <p><strong>ID:</strong> <span id="ventaId"></span></p>
                <p><strong>Fecha:</strong> <span id="ventaFecha"></span></p>
                <p><strong>Total:</strong> $<span id="ventaTotal"></span></p>

            </div>
        </div>

        <div class="card shadow">
            <div class="card-header">
                <h5 class="mb-0">Productos vendidos</h5>
            </div>

            <div class="card-body p-0">
                <table class="table table-striped mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unit.</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tablaDetalle"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="../js/ventaDetalle.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas | Mala Candys Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/admin.css">
    <link rel="stylesheet" href="../Css/ventas.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">🍭</span>
                <div>
                    <div class="brand-text">Mala Candys</div>
                    <div class="brand-sub">Panel Admin</div>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li><span class="nav-label">Principal</span></li>
                <li><a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></a></li>
                <li><span class="nav-label">Gestión</span></li>
                <li><a href="productos.html" class="nav-link"><span class="nav-icon">📦</span><span class="nav-text">Productos</span></a></li>
                <li><a href="ventas.html" class="nav-link active"><span class="nav-icon">💰</span><span class="nav-text">Ventas</span></a></li>
                <li><a href="compras.html" class="nav-link"><span class="nav-icon">🛍️</span><span class="nav-text">Compras</span></a></li>
                <li><a href="combos.html" class="nav-link"><span class="nav-icon">🍬</span><span class="nav-text">Combos</span></a>
                <li class="nav-exit mt-auto">
                    <a href="login.html" class="nav-link" onclick="logout()">
                        <span class="nav-icon">🚪</span><span class="nav-text">Salir</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- CONTENIDO -->
        <div class="admin-content">

            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn-hamburger" id="btnHamburger">☰</button>
                    <span class="topbar-title">Ventas</span>
                </div>
                <div class="topbar-actions">
                    <a href="index.html" class="topbar-link">Ver sitio →</a>
                    <div class="topbar-user">
                        <div class="topbar-avatar">A</div>
                        <span class="d-none d-sm-inline">Admin</span>
                    </div>
                </div>
            </header>

            <main class="admin-main">

                <!-- HEADER -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">💰 <span>Ventas</span></h1>
                        <small class="text-muted fw-bold">Todos los pedidos registrados</small>
                    </div>
                </div>

                <!-- FILTROS -->
                <div class="card mb-4">
                    <div class="card-body p-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-sm-6 col-lg-4">
                                <input type="text" id="inputBuscar" class="form-control form-control-sm" placeholder="🔍 Buscar por usuario o #ID...">
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <select id="filtroEstado" class="form-select form-select-sm">
                                    <option value="">Todos los estados</option>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Confirmada">Confirmada</option>
                                    <option value="EnPreparacion">En preparación</option>
                                    <option value="Enviada">Enviada</option>
                                    <option value="Entregada">Entregada</option>
                                    <option value="Cancelada">Cancelada</option>
                                </select>
                            </div>
                            <div class="col-lg-2">
                                <button class="btn btn-outline-pink btn-sm w-100" onclick="aplicarFiltros()">Filtrar</button>
                            </div>
                            <div class="col-lg-2">
                                <button class="btn btn-sm w-100" style="background:rgba(155,138,184,.1);color:#9b8ab8;font-weight:700;border-radius:10px;border:none;" onclick="limpiarFiltros()">Limpiar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABLA -->
                <div class="table-wrapper">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Fecha</th>
                                <th>Usuario</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyVentas">
                            <tr><td colspan="6" class="text-center py-4" style="color:#9b8ab8;">Cargando ventas...</td></tr>
                        </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/ventas.js"></script>
</body>
</html>
